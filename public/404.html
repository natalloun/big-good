<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA redirect: store the path and redirect to index
      var path = window.location.pathname + window.location.search + window.location.hash;
      sessionStorage.setItem('ghpages-redirect', path);
      window.location.replace('/big-good/');
    </script>
  </head>
  <body></body>
</html>

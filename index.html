<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // GitHub Pages SPA: restore redirected path
      (function() {
        var redirect = sessionStorage.getItem('ghpages-redirect');
        if (redirect) {
          sessionStorage.removeItem('ghpages-redirect');
          var base = '/big-good';
          var path = redirect.startsWith(base) ? redirect.slice(base.length) : redirect;
          if (path && path !== '/') window.history.replaceState(null, '', base + path);
        }
      })();
    </script>
    <title>Big Good | Email Marketing Ecosystem</title>
    <meta name="description" content="Big Good is the parent ecosystem of powerful email tools — Ecomail, Topol, DMARCeye, and Lettr. Built by ECOMAIL.CZ, s.r.o." />
    <meta name="robots" content="index, follow" />
    <meta property="og:site_name" content="Big Good" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://big-good.vercel.app/images/team.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
